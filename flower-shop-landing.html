<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bloom Atelier | Flower Shop Landing</title>
  <style>
    :root {
      --bg: #fff9f5;
      --ink: #2f2a28;
      --soft: #7b6d66;
      --rose: #d86f8b;
      --mint: #8bbba6;
      --card: #ffffff;
      --line: #f0dfd8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Avenir Next", "Pretendard", "Noto Sans KR", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(900px 420px at 10% -10%, #ffd7e2 0%, transparent 55%),
        radial-gradient(900px 420px at 100% 0%, #d7f5e8 0%, transparent 55%),
        var(--bg);
    }
    .wrap { max-width: 1120px; margin: 0 auto; padding: 24px; }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 22px;
    }
    .brand { font-weight: 800; letter-spacing: 0.5px; font-size: 22px; }
    .brand span { color: var(--rose); }
    .menu { color: var(--soft); font-size: 14px; }
    .hero {
      background: linear-gradient(135deg, #ffe6ef, #e8fbf2);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 34px;
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 22px;
      align-items: center;
    }
    .title { margin: 0 0 12px; font-size: clamp(30px, 5vw, 48px); line-height: 1.06; }
    .subtitle { margin: 0 0 20px; color: var(--soft); font-size: 15px; line-height: 1.6; }
    .cta {
      display: inline-block;
      background: var(--ink);
      color: #fff;
      text-decoration: none;
      padding: 12px 18px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
    }
    .hero-art {
      height: 260px;
      border-radius: 16px;
      border: 1px solid #f0d4de;
      background:
        radial-gradient(circle at 75% 25%, #ffffff 0 18%, transparent 20%),
        radial-gradient(circle at 25% 75%, #ffffff 0 18%, transparent 20%),
        linear-gradient(120deg, #d86f8b, #f4a7bc 55%, #8bbba6);
    }
    .section-title { margin: 30px 0 12px; font-size: 21px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
    }
    .thumb {
      height: 145px;
      background:
        linear-gradient(160deg, #ffd0df, #fef8fa 55%, #d9f4e8);
    }
    .body { padding: 12px; }
    .name { margin: 0 0 6px; font-size: 16px; font-weight: 700; }
    .meta {
      margin: 0;
      display: flex;
      justify-content: space-between;
      color: var(--soft);
      font-size: 13px;
    }
    .footer {
      margin-top: 24px;
      color: var(--soft);
      font-size: 13px;
      text-align: center;
    }
    @media (max-width: 860px) {
      .hero { grid-template-columns: 1fr; }
      .grid { grid-template-columns: 1fr; }
      .hero-art { height: 210px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="brand">Bloom <span>Atelier</span></div>
      <div class="menu">꽃다발 · 웨딩 · 당일배송</div>
    </div>

    <section class="hero">
      <div>
        <h1 class="title">오늘의 순간을 위한<br>꽃 한 다발</h1>
        <p class="subtitle">플로리스트 큐레이션으로 준비한 계절 꽃다발. 주문 후 2시간 이내 제작을 시작하고, 배송 전 사진 확인까지 제공합니다.</p>
        <a class="cta" href="#products">베스트 상품 보기</a>
      </div>
      <div class="hero-art" aria-label="flower visual"></div>
    </section>

    <h2 id="products" class="section-title">Best Bouquets</h2>
    <section class="grid">
      <article class="card">
        <div class="thumb"></div>
        <div class="body">
          <h3 class="name">Rose Mist</h3>
          <p class="meta"><span>장미/라넌큘러스</span><strong>48,000원</strong></p>
        </div>
      </article>
      <article class="card">
        <div class="thumb"></div>
        <div class="body">
          <h3 class="name">Mint Garden</h3>
          <p class="meta"><span>유칼립투스/튤립</span><strong>52,000원</strong></p>
        </div>
      </article>
      <article class="card">
        <div class="thumb"></div>
        <div class="body">
          <h3 class="name">Blush Day</h3>
          <p class="meta"><span>피오니/스톡</span><strong>57,000원</strong></p>
        </div>
      </article>
    </section>

    <p class="footer">Open 10:00 - 20:00 · Same-day delivery available</p>
  </div>
</body>
</html>
